version: '3.9'

services:
  postgres:
    image: postgres:16
    container_name: ev_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: ev_charging_db
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    container_name: ev_redis
    restart: always
    ports:
      - "6379:6379"
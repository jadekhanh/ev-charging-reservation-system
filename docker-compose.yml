services:
  app:
    build: .
    container_name: ev_backend
    restart: always
    ports:
      - "5001:5000"
    depends_on:
      - postgres
      - redis
    environment:
      DATABASE_URL: postgresql://postgres:password@postgres:5432/ev_charging_db
      REDIS_URL: redis://redis:6379
      JWT_SECRET: your_jwt_secret

  postgres:
    image: postgres:16
    container_name: ev_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: ev_charging_db
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    container_name: ev_redis
    restart: always
    ports:
      - "6379:6379"